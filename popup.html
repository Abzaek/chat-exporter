<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <title>ChatGPT Exporter</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            padding: 16px;
            width: 250px;
            margin: 0;
            color: #ECECF1;
            background-color: #343541;
        }

        h2 {
            margin-top: 0;
            font-size: 16px;
            text-align: center;
            margin-bottom: 16px;
        }

        button {
            background-color: #10A37F;
            color: white;
            border: none;
            border-radius: 4px;
            padding: 10px 16px;
            width: 100%;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            transition: background-color 0.2s;
        }

        button:hover {
            background-color: #1A7F64;
        }

        #status {
            margin-top: 12px;
            font-size: 12px;
            text-align: center;
            color: #8E8EA0;
        }
    </style>
</head>

<body>
    <h2>Export Conversation</h2>
    <button id="exportBtn">Export as Markdown</button>
    <div id="status"></div>
    <script src="popup.js"></script>
</body>

</html>
